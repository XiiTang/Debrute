name: Debrute Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: pnpm install --frozen-lockfile
      - name: Validate tag version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
      - run: node scripts/validate-release-version-contract.mjs
      - run: pnpm doctor
      - run: pnpm check
      - run: pnpm test
      - run: pnpm lint:arch

  build-cli:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:cli:all
      - uses: actions/upload-artifact@v4
        with:
          name: debrute-cli-release-assets
          path: |
            release/debrute-cli/debrute-cli-*.tar.gz
            release/debrute-cli/debrute-cli-*.zip

  build-desktop:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            publicPlatform: macos
            arch: arm64
          - os: macos-15-intel
            platform: darwin
            publicPlatform: macos
            arch: x64
          - os: macos-latest
            platform: darwin
            publicPlatform: macos
            arch: universal
          - os: windows-latest
            platform: win32
            publicPlatform: windows
            arch: x64
          - os: ubuntu-latest
            platform: linux
            publicPlatform: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Build Desktop assets
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" = "darwin" ] && [ "${{ matrix.arch }}" = "universal" ]; then
            pnpm --filter @debrute/desktop exec electron-builder --mac zip --universal --publish never
          elif [ "${{ matrix.platform }}" = "darwin" ]; then
            pnpm --filter @debrute/desktop exec electron-builder --mac dmg --${{ matrix.arch }} --publish never
          elif [ "${{ matrix.platform }}" = "win32" ]; then
            pnpm --filter @debrute/desktop exec electron-builder --win nsis --x64 --publish never
          else
            pnpm --filter @debrute/desktop exec electron-builder --linux AppImage --x64 --publish never
          fi
      - name: Verify Desktop assets
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/desktop-release-assets.mjs --release-dir apps/desktop/release --version "$VERSION" --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}"
      - uses: actions/upload-artifact@v4
        with:
          name: debrute-desktop-${{ matrix.publicPlatform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/debrute-desktop-*
            apps/desktop/release/latest-mac.yml
            apps/desktop/release/latest.yml

  build-photoshop-plugins:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm package:photoshop-plugin
      - uses: actions/upload-artifact@v4
        with:
          name: photoshop-plugins
          path: |
            release/photoshop-uxp/debrute-photoshop-uxp-*.ccx
            release/photoshop-cep/debrute-photoshop-cep-*.zip

  publish-release:
    needs:
      - build-cli
      - build-desktop
      - build-photoshop-plugins
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Flatten assets and checksums
        run: |
          mkdir -p release-upload
          find release-assets -type f -print -exec cp {} release-upload/ \;
          cd release-upload
          find . -maxdepth 1 -type f ! -name debrute_SHA256SUMS -printf '%P\0' | sort -z | xargs -0 sha256sum > debrute_SHA256SUMS
      - name: Verify expected assets
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node -e "import('./scripts/release-asset-contract.mjs').then(({expectedReleaseAssets}) => { const fs = require('fs'); const expected = expectedReleaseAssets(process.argv[1]); const missing = expected.filter((name) => !fs.existsSync('release-upload/' + name)); if (missing.length) { console.error('Missing release assets:', missing.join(', ')); process.exit(1); } })" "$VERSION"
      - name: Write release notes
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          cat > release-notes.md <<EOF
          # Debrute ${VERSION}

          Desktop assets:
          - macOS: DMG installers for Apple Silicon and Intel Macs, plus a universal zip for updates.
          - Windows: NSIS installer for x64.
          - Linux: AppImage for x64.

          Debrute CLI is managed from Debrute Desktop Settings under Debrute CLI. Manual CLI installs should download the matching debrute-cli asset, verify it with debrute_SHA256SUMS, then run:

          debrute --version
          debrute skills sync

          Skills commands:
          - debrute skills status
          - debrute skills sync
          - debrute skills sync --force
          EOF
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-upload/*
