name: Debrute Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false

jobs:
  preflight:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prepare pinned native raster payload
        run: pnpm native:raster:prepare
      - name: Validate tag version
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
      - run: node scripts/validate-release-version-contract.mjs
      - run: pnpm doctor
      - run: pnpm check
      - run: pnpm test
      - run: pnpm lint:arch

  build-desktop:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            publicPlatform: macos
            arch: arm64
            required: true
          - os: macos-15-intel
            platform: darwin
            publicPlatform: macos
            arch: x64
            required: true
          - os: windows-latest
            platform: win32
            publicPlatform: windows
            arch: x64
            required: true
          - os: ubuntu-latest
            platform: linux
            publicPlatform: linux
            arch: x64
            required: false
    continue-on-error: ${{ matrix.required == false }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.2.2
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Prepare pinned native raster payload
        if: matrix.platform == 'darwin' || matrix.platform == 'win32'
        run: pnpm native:raster:prepare
      - name: Test Windows Rust product commit primitives
        if: matrix.platform == 'win32'
        run: pnpm test:rust
      - run: pnpm build
      - name: Prepare Apple signing and notarization credentials
        if: matrix.platform == 'darwin'
        shell: bash
        env:
          APPLE_API_KEY_SECRET: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CSC_LINK_SECRET: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD_SECRET: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0
          for name in CSC_LINK_SECRET CSC_KEY_PASSWORD_SECRET APPLE_API_KEY_SECRET APPLE_API_KEY_ID APPLE_API_ISSUER; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required macOS signing secret: ${name%_SECRET}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_SECRET" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"

          P12_PATH="$RUNNER_TEMP/developer-id-application.p12"
          DEVELOPER_ID_G2_PATH="$RUNNER_TEMP/DeveloperIDG2CA.cer"
          printf '%s' "$CSC_LINK_SECRET" | base64 --decode > "$P12_PATH"
          chmod 600 "$P12_PATH"
          curl -fsSL https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer -o "$DEVELOPER_ID_G2_PATH"

          SIGNING_KEYCHAIN="$RUNNER_TEMP/debrute-signing.keychain-db"
          SIGNING_KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          security create-keychain -p "$SIGNING_KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          security set-keychain-settings -lut 21600 "$SIGNING_KEYCHAIN"
          security unlock-keychain -p "$SIGNING_KEYCHAIN_PASSWORD" "$SIGNING_KEYCHAIN"
          security import "$DEVELOPER_ID_G2_PATH" -k "$SIGNING_KEYCHAIN"
          security import "$P12_PATH" \
            -k "$SIGNING_KEYCHAIN" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild \
            -P "$CSC_KEY_PASSWORD_SECRET"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$SIGNING_KEYCHAIN_PASSWORD" \
            "$SIGNING_KEYCHAIN"
          EXISTING_KEYCHAINS="$(security list-keychains -d user | tr -d '"' | tr '\n' ' ')"
          security list-keychains -d user -s "$SIGNING_KEYCHAIN" $EXISTING_KEYCHAINS
          security find-identity -v -p codesigning "$SIGNING_KEYCHAIN" | grep 'Developer ID Application: Hongrui Wu (FR25929R7Z)'
          {
            echo "APPLE_API_KEY=$APPLE_API_KEY_PATH"
            echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID"
            echo "APPLE_API_ISSUER=$APPLE_API_ISSUER"
            echo "CSC_NAME=Hongrui Wu (FR25929R7Z)"
          } >> "$GITHUB_ENV"
      - name: Sign macOS Product binaries and rebuild the strict seed
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          for binary in target/release/debrute-runtime target/release/debrute target/release/native-raster/*.dylib; do
            codesign --force --options runtime --timestamp --sign "$CSC_NAME" "$binary"
            codesign --verify --strict --verbose=2 "$binary"
          done
          node scripts/assemble-product-seed.mjs
          RUNTIME_APP="apps/desktop/dist-electron/product-seed/runtime/Debrute Runtime.app"
          codesign --force --options runtime --timestamp --sign "$CSC_NAME" "$RUNTIME_APP"
          codesign --verify --deep --strict --verbose=2 "$RUNTIME_APP"
          node scripts/refresh-product-seed-manifest.mjs
      - name: Sign Windows Product binaries and rebuild the strict seed
        if: matrix.platform == 'win32'
        shell: pwsh
        env:
          WINDOWS_CSC_LINK_SECRET: ${{ secrets.WINDOWS_CSC_LINK }}
          WINDOWS_CSC_KEY_PASSWORD_SECRET: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CSC_LINK_SECRET) -or [string]::IsNullOrWhiteSpace($env:WINDOWS_CSC_KEY_PASSWORD_SECRET)) {
            throw 'WINDOWS_CSC_LINK and WINDOWS_CSC_KEY_PASSWORD are required.'
          }
          $pfx = Join-Path $env:RUNNER_TEMP 'debrute-windows-signing.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CSC_LINK_SECRET))
          $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Filter signtool.exe -Recurse |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signTool) { throw 'signtool.exe is unavailable.' }
          foreach ($binary in @('target/release/debrute-runtime.exe', 'target/release/debrute.exe')) {
            & $signTool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $pfx /p $env:WINDOWS_CSC_KEY_PASSWORD_SECRET $binary
            if ($LASTEXITCODE -ne 0) { throw "Failed to sign $binary" }
            & $signTool verify /pa /v $binary
            if ($LASTEXITCODE -ne 0) { throw "Failed to verify $binary" }
          }
          "WIN_CSC_LINK=$pfx" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "WIN_CSC_KEY_PASSWORD=$env:WINDOWS_CSC_KEY_PASSWORD_SECRET" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          node scripts/assemble-product-seed.mjs
      - name: Archive signed Product seed
        if: matrix.platform == 'darwin' || matrix.platform == 'win32'
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/archive-product-seed.mjs --platform "${{ matrix.publicPlatform }}" --arch "${{ matrix.arch }}" --version "$VERSION"
      - name: Build signed macOS Desktop assets
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @debrute/desktop exec electron-builder --mac dmg --${{ matrix.arch }} --publish never
      - name: Notarize macOS DMG
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          DMG_PATH="apps/desktop/release/debrute-desktop-${VERSION}-macos-${{ matrix.arch }}.dmg"
          node scripts/notarize-macos-artifact.cjs \
            --path "$DMG_PATH" \
            --label "debrute-desktop-${VERSION}-macos-${{ matrix.arch }}.dmg"
      - name: Build Desktop assets
        if: matrix.platform != 'darwin'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.platform }}" = "win32" ]; then
            pnpm --filter @debrute/desktop exec electron-builder --win nsis --x64 --publish never
          else
            pnpm --filter @debrute/desktop exec electron-builder --linux AppImage --x64 --publish never
          fi
      - name: Smoke test packaged Windows Desktop and Runtime
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          $desktop = Resolve-Path 'apps/desktop/release/win-unpacked/debrute.exe'
          $cli = Resolve-Path 'apps/desktop/release/win-unpacked/resources/product-seed/runtime/debrute.exe'
          $desktopProcess = Start-Process -FilePath $desktop -PassThru
          $ready = $false
          $lastStatus = ''
          try {
            $deadline = [DateTime]::UtcNow.AddSeconds(30)
            while ([DateTime]::UtcNow -lt $deadline) {
              Start-Sleep -Milliseconds 500
              if ($desktopProcess.HasExited) {
                throw "Packaged Desktop exited before Runtime became ready with code $($desktopProcess.ExitCode)."
              }
              $statusLines = & $cli runtime status 2>&1
              $statusCode = $LASTEXITCODE
              $lastStatus = $statusLines | Out-String
              if ($statusCode -eq 0 -and $lastStatus.Contains('runtime_state=ready') -and $lastStatus.Contains('native_tray=active')) {
                $ready = $true
                break
              }
            }
            if (-not $ready) {
              throw "Packaged Runtime did not become ready with its notification-area item. Last status: $lastStatus"
            }
          } finally {
            & $cli runtime stop *> $null
            if (-not $desktopProcess.HasExited) {
              Stop-Process -Id $desktopProcess.Id -Force
            }
            Get-Process -Name 'debrute-runtime' -ErrorAction SilentlyContinue | Stop-Process -Force
          }
      - name: Verify Desktop assets
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/desktop-release-assets.mjs --release-dir apps/desktop/release --version "$VERSION" --platform "${{ matrix.platform }}" --arch "${{ matrix.arch }}"
      - name: Verify macOS signing
        if: matrix.platform == 'darwin'
        shell: bash
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/verify-macos-desktop-signing.mjs --release-dir apps/desktop/release --version "$VERSION" --arch "${{ matrix.arch }}" --bundle-id io.github.xiitang.debrute
      - uses: actions/upload-artifact@v4
        with:
          name: debrute-desktop-${{ matrix.publicPlatform }}-${{ matrix.arch }}
          path: |
            apps/desktop/release/debrute-desktop-*-${{ matrix.publicPlatform }}-${{ matrix.arch }}.dmg
            apps/desktop/release/debrute-desktop-*-${{ matrix.publicPlatform }}-${{ matrix.arch }}.exe
            apps/desktop/release/debrute-desktop-*-${{ matrix.publicPlatform }}-${{ matrix.arch }}.AppImage
            apps/desktop/release/debrute-product-*-${{ matrix.publicPlatform }}-${{ matrix.arch }}.zip

  publish-release:
    needs:
      - build-desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
      - name: Flatten assets
        run: |
          set -euo pipefail
          mkdir -p release-upload
          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            if [ -e "release-upload/$name" ]; then
              echo "::error::Duplicate release asset: $name"
              exit 1
            fi
            cp "$file" "release-upload/$name"
          done < <(find release-assets -type f -print0)
      - name: Generate signed update manifest
        env:
          DEBRUTE_UPDATE_SIGNING_PRIVATE_KEY_PEM: ${{ secrets.DEBRUTE_UPDATE_SIGNING_PRIVATE_KEY_PEM }}
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node scripts/generate-update-manifest.mjs --release-dir release-upload --version "$VERSION"
          test -f release-upload/debrute-update-manifest.json
          test -f release-upload/debrute-update-manifest.json.sig
      - name: Verify expected assets
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          node -e "import('./scripts/release-asset-contract.mjs').then(({allowedReleaseAssets, expectedReleaseAssets}) => { const fs = require('fs'); const actual = fs.readdirSync('release-upload').sort(); const expected = expectedReleaseAssets(process.argv[1]).sort(); const allowed = allowedReleaseAssets(process.argv[1]); const missingAssets = expected.filter((name) => !actual.includes(name)); const unexpectedAssets = actual.filter((name) => !allowed.includes(name)); if (missingAssets.length) { console.error('Missing release assets:', missingAssets.join(', ')); process.exit(1); } if (unexpectedAssets.length) { console.error('Unexpected release assets:', unexpectedAssets.join(', ')); process.exit(1); } })" "$VERSION"
      - name: Write release notes
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          cat > release-notes.md <<EOF
          # Debrute ${VERSION}

          Desktop assets:
          - macOS: signed and notarized DMG installers for Apple Silicon and Intel Macs.
          - Windows: NSIS installer for x64.
          - Linux: x64 AppImage when the best-effort build succeeds.

          Runtime update payloads for macOS and Windows are complete signed Product seeds; they are consumed by Debrute Runtime and are not separate user installers.

          Install Debrute by downloading the desktop installer for your platform. The runtime materializes the matching debrute CLI and official Skills on first launch, and product updates keep Desktop, runtime, CLI, and Skills on the same version.
          EOF
      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: release-upload/*
