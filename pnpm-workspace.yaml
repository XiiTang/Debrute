packages:
  - apps/*
  - packages/*

overrides:
  "@types/node": 24.13.1
  form-data@4.0.5: 4.0.6
  undici@6.26.0: 6.27.0
  undici@7.27.1: 7.28.0

supportedArchitectures:
  os:
    - darwin
    - linux
    - win32
  cpu:
    - arm64
    - x64

allowBuilds:
  electron: true
  electron-winstaller: true
  esbuild: true
  node-pty: true
  sharp: true

onlyBuiltDependencies:
  - "@yao-pkg/pkg"
  - electron
  - electron-builder
  - electron-winstaller
  - esbuild
  - node-pty
  - sharp

minimumReleaseAgeExclude:
  - '@codemirror/view@6.43.6'
  - '@vitest/expect@4.1.10'
  - '@vitest/mocker@4.1.10'
  - '@vitest/pretty-format@4.1.10'
  - '@vitest/runner@4.1.10'
  - '@vitest/snapshot@4.1.10'
  - '@vitest/spy@4.1.10'
  - '@vitest/utils@4.1.10'
  - vitest@4.1.10
