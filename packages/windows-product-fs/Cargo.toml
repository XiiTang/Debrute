[package]
name = "debrute-windows-product-fs"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[target.'cfg(target_os = "windows")'.dependencies]
junction.workspace = true
windows-sys.workspace = true

# This crate is the single reviewed native safety capsule for Windows reparse
# point and durability calls. It intentionally does not inherit the workspace's
# `unsafe_code = "forbid"`; all other current workspace Rust lints are copied
# here and unsafe blocks must carry local SAFETY arguments.
[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
