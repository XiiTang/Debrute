[package]
name = "debrute-native-process"
version.workspace = true
edition.workspace = true
license.workspace = true
rust-version.workspace = true

[target.'cfg(target_os = "macos")'.dependencies]
libc.workspace = true

[target.'cfg(target_os = "windows")'.dependencies]
uuid.workspace = true
windows-sys.workspace = true

# This crate is the single reviewed native safety capsule for macOS process-group
# and Windows Job Object ownership that Rust's standard process API does not expose.
[lints.rust]
unsafe_code = "allow"

[lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
